services:
  postgres:
    image: postgres:16-alpine
    container_name: lnkcore-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lnkcore}
      POSTGRES_USER: ${POSTGRES_USER:-lnkcore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lnkcore-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lnkcore}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/matheus55391/lnkcore:${IMAGE_TAG:?IMAGE_TAG not set}
    container_name: lnkcore-app

    ports:
      - "127.0.0.1:3000:3000"

    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PRO_PRICE_ID=${STRIPE_PRO_PRICE_ID}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_REGION=${S3_REGION}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET}
      - S3_FORCE_PATH_STYLE=${S3_FORCE_PATH_STYLE:-false}
      - S3_PUBLIC_URL=${S3_PUBLIC_URL}

    depends_on:
      postgres:
        condition: service_healthy

    restart: unless-stopped

    networks:
      - lnkcore-network

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  lnkcore-network:
    driver: bridge

volumes:
  postgres_data: