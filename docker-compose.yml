services:
  postgres:
    image: postgres:16-alpine
    container_name: lnkcore-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lnkcore
      POSTGRES_USER: lnkcore
      POSTGRES_PASSWORD: lnkcore
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: lnkcore-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: lnkcore
      MINIO_ROOT_PASSWORD: lnkcore123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: lnkcore-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 lnkcore lnkcore123 &&
        mc mb --ignore-existing local/lnkcore &&
        mc anonymous set public local/lnkcore
      "
    restart: "no"

volumes:
  postgres_data:
  minio_data:
