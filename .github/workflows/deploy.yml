name: Deploy

on:
  push:
    branches:
      - main

jobs:
  quality:
    name: Validar lint e testes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Testes
        run: npm run test

  deploy:
    name: Deploy na VPS
    runs-on: ubuntu-latest
    environment: production
    needs: quality

    steps:
      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # printf preserva o trailing newline — chaves sem ele são rejeitadas pelo SSH
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          # Obtém fingerprint real da VPS — evita man-in-the-middle
          SERVER_IP=$(echo "${{ secrets.SERVER_HOST }}" | cut -d@ -f2)
          ssh-keyscan -H "$SERVER_IP" >> ~/.ssh/known_hosts 2>/dev/null
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy
        run: |
          timeout 300 ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes -o ConnectTimeout=15 "${{ secrets.SERVER_HOST }}" bash << 'ENDSSH'
            set -e
            cd /opt/apps/lnkcore

            echo ">>> Atualizando código..."
            git pull origin main

            echo ">>> Subindo containers..."
            docker compose -f docker-compose.prod.yml --env-file .env up -d --build

            echo ">>> Limpando imagens antigas..."
            docker image prune -f

            echo ">>> Status dos containers:"
            docker compose -f docker-compose.prod.yml ps
          ENDSSH

