name: Deploy

on:
  push:
    branches:
      - main
      - dev

jobs:
  build_and_push:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    # Only deploy production on main; dev branch just validates the build
    environment: ${{ github.ref_name == 'main' && 'production' || 'dev' }}

    env:
      IMAGE_TAG: ${{ github.ref_name == 'main' && 'latest' || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build e push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/lnkcore:${{ env.IMAGE_TAG }}
          # GitHub Actions cache reduz o tempo de build em ~60% em pushes repetidos
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy na VPS
    runs-on: ubuntu-latest
    needs: build_and_push
    # Apenas deploya quando o push é na branch main
    if: github.ref_name == 'main'
    environment: production

    env:
      IMAGE_TAG: latest

    steps:
      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          # Obtém o fingerprint real da VPS — evita ataques man-in-the-middle
          SERVER_IP=$(echo "${{ secrets.SERVER_HOST }}" | cut -d@ -f2)
          ssh-keyscan -H "$SERVER_IP" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy
        env:
          HOST: ${{ secrets.SERVER_HOST }}
          DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
        run: |
          set -e

          timeout 300 ssh -o BatchMode=yes -o ConnectTimeout=15 "$HOST" bash << 'ENDSSH'
            set -e
            cd ~/lnkcore

            # Atualiza IMAGE_TAG no .env do servidor
            if grep -q '^IMAGE_TAG=' .env 2>/dev/null; then
              sed -i 's|^IMAGE_TAG=.*|IMAGE_TAG=latest|' .env
            else
              echo 'IMAGE_TAG=latest' >> .env
            fi

            # Sincroniza apenas os arquivos de infra (sem tocar no .env)
            git fetch origin main
            git checkout origin/main -- docker-compose.prod.yml dockerfile

            # Puxa nova imagem e reinicia
            docker compose -f docker-compose.prod.yml --env-file .env pull
            docker compose -f docker-compose.prod.yml --env-file .env up -d --remove-orphans

            # Libera imagens antigas para economizar disco
            docker image prune -f
          ENDSSH

      - name: Verificar saúde
        env:
          HOST: ${{ secrets.SERVER_HOST }}
        run: |
          echo "Aguardando container inicializar (30s)..."
          sleep 30
          timeout 60 ssh -o BatchMode=yes "$HOST" \
            "docker inspect --format='Status: {{.State.Status}} | Health: {{if .State.Health}}{{.State.Health.Status}}{{else}}sem healthcheck{{end}}' lnkcore-app"
