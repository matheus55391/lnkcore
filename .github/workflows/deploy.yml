name: Deploy

on:
  push:
    branches:
      - main

jobs:
  quality:
    name: Validar lint e testes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Testes
        run: npm run test

  build:
    name: Build e publicar imagem
    runs-on: ubuntu-latest
    needs: quality
    outputs:
      image_tag: ${{ steps.version.outputs.image_tag }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Definir tag da imagem pela versão do package.json
        id: version
        run: echo "image_tag=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/lnkcore:${{ steps.version.outputs.image_tag }}

  deploy:
    name: Deploy na VPS
    runs-on: ubuntu-latest
    environment: production
    needs: build
    permissions:
      packages: read

    steps:
      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # printf preserva o trailing newline — chaves sem ele são rejeitadas pelo SSH
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          # Obtém fingerprint real da VPS — evita man-in-the-middle
          SERVER_IP=$(echo "${{ secrets.SERVER_HOST }}" | cut -d@ -f2)
          ssh-keyscan -H "$SERVER_IP" >> ~/.ssh/known_hosts 2>/dev/null
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy
        run: |
          timeout 300 ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes -o ConnectTimeout=15 "${{ secrets.SERVER_HOST }}" << ENDSSH
            set -e
            export IMAGE_TAG=${{ needs.build.outputs.image_tag }}
            cd /opt/apps/lnkcore

            echo ">>> Atualizando docker-compose..."
            git pull origin main

            echo ">>> Login no GHCR..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            echo ">>> Baixando nova imagem..."
            docker pull ghcr.io/${{ github.repository_owner }}/lnkcore:${{ needs.build.outputs.image_tag }}

            echo ">>> Subindo containers..."
            docker compose -f docker-compose.prod.yml --env-file .env up -d

            echo ">>> Limpando imagens antigas..."
            docker image prune -f

            echo ">>> Status dos containers:"
            docker compose -f docker-compose.prod.yml ps
          ENDSSH